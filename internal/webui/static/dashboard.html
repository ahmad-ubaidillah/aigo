<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aigo</title>
<style>
:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#c9d1d9;--muted:#8b949e;--accent:#58a6ff;--green:#3fb950;--red:#f85149;--radius:6px}
html.light{--bg:#ffffff;--surface:#f6f8fa;--border:#d0d7de;--text:#24292f;--muted:#6e7781;--accent:#0969da;--green:#1a7f37;--red:#cf222e}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);overflow:hidden}
.app{display:flex;height:100vh}
aside{width:260px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.brand{padding:1rem 1rem .75rem;border-bottom:1px solid var(--border)}
.brand h1{font-size:1.1rem;font-weight:600;letter-spacing:-0.3px}
.brand h1 span{color:var(--accent)}
.brand .tagline{font-size:.7rem;color:var(--muted);margin-top:.15rem}
.history{padding:.5rem .75rem;flex:1;overflow-y:auto;min-height:0}
.history h3{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:.4rem}
.history .new-chat{width:100%;padding:.4rem .6rem;border:1px dashed var(--border);border-radius:var(--radius);background:transparent;color:var(--muted);font-size:.8rem;cursor:pointer;margin-bottom:.5rem;text-align:left}
.history .new-chat:hover{border-color:var(--accent);color:var(--accent)}
.history .item{padding:.4rem .5rem;border-radius:var(--radius);cursor:pointer;font-size:.8rem;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:.4rem}
.history .item:hover{background:rgba(88,166,255,.08)}
.history .item.active{background:rgba(88,166,255,.12);color:var(--accent)}
.history .item .del{opacity:0;margin-left:auto;font-size:.75rem;color:var(--muted)}
.history .item:hover .del{opacity:1}
.history .item .del:hover{color:var(--red)}
.stats{padding:.75rem 1rem;border-top:1px solid var(--border);font-size:.75rem;color:var(--muted);line-height:1.6}
.stats .row{display:flex;justify-content:space-between;gap:.5rem;margin-bottom:.2rem}
main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:48px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 1rem;flex-shrink:0}
.topbar .title{font-size:.9rem;font-weight:500;color:var(--text)}
.topbar .actions{display:flex;align-items:center;gap:.5rem}
.topbar .status{display:flex;align-items:center;gap:.4rem;font-size:.75rem;color:var(--muted)}
.topbar .dot{width:7px;height:7px;border-radius:50%;background:var(--green)}
.topbar .theme-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:.25rem .5rem;border-radius:var(--radius);cursor:pointer;font-size:.8rem}
.topbar .theme-btn:hover{color:var(--text);border-color:var(--text)}
.content{flex:1;overflow:hidden;position:relative}
.panel{display:none;flex-direction:column;height:100%}
.panel.active{display:flex}

/* Chat */
.messages{flex:1;overflow-y:auto;padding:1rem 1.25rem;display:flex;flex-direction:column;gap:.6rem}
.msg{max-width:720px;animation:in .18s ease}
@keyframes in{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.msg .who{font-size:.65rem;color:var(--muted);margin-bottom:.1rem;text-transform:uppercase;letter-spacing:.4px}
.msg .who b{color:var(--accent)}
.msg .bubble{padding:.55rem .8rem;border-radius:var(--radius);font-size:.9rem;line-height:1.55;white-space:pre-wrap;word-break:break-word}
.msg.user{margin-left:auto}
.msg.user .who{text-align:right}
.msg.user .bubble{background:rgba(88,166,255,.1);border:1px solid rgba(88,166,255,.2)}
.msg.bot .bubble{background:var(--surface);border:1px solid var(--border)}
.msg .copy{opacity:0;transition:opacity .15s;font-size:.65rem;color:var(--muted);cursor:pointer;margin-left:.4rem;vertical-align:middle}
.msg:hover .copy{opacity:1}
.msg .copy:hover{color:var(--accent)}
.typing{display:none;align-items:center;gap:.4rem;padding:0 .85rem;color:var(--muted);font-size:.85rem}
.typing.active{display:flex}
.typing .dots{display:flex;gap:3px}
.typing .dot{width:5px;height:5px;border-radius:50%;background:var(--muted);animation:bounce 1.2s infinite}
.typing .dot:nth-child(2){animation-delay:.15s}
.typing .dot:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-4px)}}
.inputbar{padding:.75rem 1.25rem;border-top:1px solid var(--border);display:flex;gap:.5rem;flex-shrink:0}
.inputbar input{flex:1;padding:.55rem .85rem;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);color:var(--text);font-size:.9rem;outline:none}
.inputbar input:focus{border-color:var(--accent)}
.inputbar button{padding:.55rem 1rem;border:none;border-radius:var(--radius);background:var(--accent);color:#fff;font-size:.85rem;cursor:pointer;opacity:.9}
.inputbar button:hover{opacity:1}
.inputbar button:disabled{opacity:.4;cursor:not-allowed}

/* Skills */
.toolbar{padding:.75rem 1.25rem;border-bottom:1px solid var(--border);display:flex;gap:.5rem;align-items:center;flex-shrink:0}
.toolbar input{flex:1;max-width:320px;padding:.45rem .7rem;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);color:var(--text);font-size:.85rem;outline:none}
.toolbar input:focus{border-color:var(--accent)}
.toolbar button{padding:.45rem .75rem;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);color:var(--text);font-size:.8rem;cursor:pointer}
.toolbar button:hover{border-color:var(--accent);color:var(--accent)}
.skills-body{flex:1;overflow-y:auto;padding:1rem 1.25rem;display:flex;flex-direction:column;gap:.5rem}
.skill-row{display:flex;align-items:center;justify-content:space-between;padding:.7rem .9rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:border-color .12s}
.skill-row:hover{border-color:var(--accent)}
.skill-row .left{min-width:0}
.skill-row .name{font-size:.85rem;font-weight:500;margin-bottom:.15rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.skill-row .desc{font-size:.75rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.skill-row .right{display:flex;align-items:center;gap:.5rem;flex-shrink:0}
.skill-row .tag{font-size:.7rem;color:var(--muted);background:var(--bg);padding:.15rem .4rem;border-radius:4px}
.skill-row .btn{padding:.3rem .6rem;border:none;border-radius:4px;background:var(--accent);color:#fff;font-size:.75rem;cursor:pointer;opacity:.9}
.skill-row .btn:hover{opacity:1}
.skill-row .btn.done{background:var(--green);cursor:default}
.empty{text-align:center;color:var(--muted);padding:3rem 1rem;font-size:.85rem}

/* Settings */
.settings-body{flex:1;overflow-y:auto;padding:1rem 1.25rem;max-width:720px}
.settings-body h2{font-size:1rem;font-weight:500;margin-bottom:1rem;color:var(--text)}
.section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;margin-bottom:1rem}
.section h3{font-size:.85rem;font-weight:500;margin-bottom:.75rem;color:var(--text);text-transform:uppercase;letter-spacing:.4px}
.field{margin-bottom:.65rem}
.field label{display:block;font-size:.75rem;color:var(--muted);margin-bottom:.25rem}
.field input,.field select,.field textarea{width:100%;padding:.5rem .65rem;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);color:var(--text);font-size:.85rem;outline:none;font-family:inherit}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent)}
.field textarea{min-height:60px;resize:vertical}
.actions{display:flex;gap:.5rem;margin-top:1rem}
.actions .primary{padding:.5rem 1.2rem;border:none;border-radius:var(--radius);background:var(--accent);color:#fff;font-size:.85rem;cursor:pointer;opacity:.9}
.actions .primary:hover{opacity:1}
.actions .secondary{padding:.5rem 1.2rem;border:1px solid var(--border);border-radius:var(--radius);background:transparent;color:var(--muted);font-size:.85rem;cursor:pointer}
.actions .secondary:hover{color:var(--text);border-color:var(--text)}

/* Toast */
.toast{position:fixed;bottom:1rem;right:1rem;padding:.55rem 1rem;border-radius:var(--radius);background:var(--surface);border:1px solid var(--border);color:var(--text);font-size:.8rem;z-index:100;opacity:0;transform:translateY(8px);transition:all .2s;pointer-events:none;max-width:320px}
.toast.show{opacity:1;transform:translateY(0)}
.toast.ok{border-color:var(--green);color:var(--green)}
.toast.err{border-color:var(--red);color:var(--red)}

@media(max-width:640px){
  aside{position:absolute;z-index:50;height:100%;transform:translateX(-100%);transition:transform .2s}
  aside.open{transform:translateX(0)}
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:40;display:none}
  .overlay.open{display:block}
  .topbar .menu{display:block;background:none;border:none;color:var(--text);font-size:1.1rem;cursor:pointer}
}
@media(min-width:641px){
  .topbar .menu{display:none}
  .overlay{display:none!important}
}
</style>
</head>
<body>
<div class="overlay" id="overlay" onclick="toggleMenu()"></div>
<div class="app">
<aside id="sidebar">
  <div class="brand">
    <h1>Aigo <span>Agent</span></h1>
    <div class="tagline">Execute with Zen</div>
  </div>
  <div class="history" id="historyBox">
    <h3>History</h3>
    <button class="new-chat" onclick="newChat()">+ New chat</button>
    <div id="historyList"></div>
  </div>
  <div class="stats" id="statsBox">
    <div class="row"><span>Uptime</span><span id="stUptime">-</span></div>
    <div class="row"><span>Messages</span><span id="stMsgs">0</span></div>
    <div class="row"><span>Model</span><span id="stModel">-</span></div>
    <div class="row"><span>Tools</span><span id="stTools">-</span></div>
  </div>
</aside>
<main>
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:.6rem">
      <button class="menu" onclick="toggleMenu()">☰</button>
      <span class="title" id="pageTitle">Chat</span>
    </div>
    <div class="actions">
      <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">◐</button>
      <div class="status"><span class="dot"></span><span id="stStatus">Running</span></div>
    </div>
  </div>
  <div class="content">
    <!-- Chat -->
    <div class="panel active" id="p-chat">
      <div class="messages" id="messages"></div>
      <div class="typing" id="typing"><span class="dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span><span>Aigo is thinking…</span></div>
      <div class="inputbar">
        <input type="text" id="msgInput" placeholder="Type a message…" autocomplete="off" onkeydown="if(event.key==='Enter')sendMsg()">
        <button id="sendBtn" onclick="sendMsg()">Send</button>
      </div>
    </div>
    <!-- Skills -->
    <div class="panel" id="p-skills">
      <div class="toolbar">
        <input type="text" id="skillQ" placeholder="Search skills…" onkeydown="if(event.key==='Enter')searchSkills()">
        <button onclick="searchSkills()">Search</button>
        <button onclick="syncSkills()">Sync</button>
        <button onclick="loadSkills('installed')">Installed</button>
        <button onclick="loadSkills('popular')">Popular</button>
      </div>
      <div class="skills-body" id="skillsBox"></div>
    </div>
    <!-- Settings -->
    <div class="panel" id="p-settings">
      <div class="settings-body" id="settingsBox"></div>
    </div>
  </div>
</main>
</div>
<div class="toast" id="toast"></div>

<script>
const $=id=>document.getElementById(id);
let currentTab='chat',skillPage='popular',chatId=Date.now(),chats=[];

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function toast(msg,ok){const t=$('toast');t.textContent=msg;t.className='toast show '+(ok?'ok':'err');clearTimeout(t._t);t._t=setTimeout(()=>t.className='toast',2500)}
function toggleMenu(){$('sidebar').classList.toggle('open');$('overlay').classList.toggle('open')}

// Theme
function toggleTheme(){const isLight=document.documentElement.classList.toggle('light');localStorage.setItem('aigo-theme',isLight?'light':'dark');$('themeBtn').textContent=isLight?'◑':'◐'}
(function(){if(localStorage.getItem('aigo-theme')==='light'){document.documentElement.classList.add('light');$('themeBtn').textContent='◑'}})();

// Chat history
function loadChats(){try{chats=JSON.parse(localStorage.getItem('aigo-chats')||'[]')}catch(e){chats=[]}renderHistory()}
function saveChats(){localStorage.setItem('aigo-chats',JSON.stringify(chats.slice(0,50)))}
function renderHistory(){
  const box=$('historyList');box.innerHTML='';
  chats.forEach(c=>{
    const d=document.createElement('div');d.className='item'+(c.id===chatId?' active':'');
    d.innerHTML='<span>◆</span><span style="flex:1;overflow:hidden;text-overflow:ellipsis">'+esc(c.title||'Untitled')+'</span><span class="del" onclick="event.stopPropagation();delChat('+c.id+')">×</span>';
    d.onclick=()=>openChat(c.id);
    box.appendChild(d);
  });
}
function newChat(){
  chatId=Date.now();
  chats.unshift({id:chatId,title:'New chat',messages:[{role:'bot',text:'Hello! I am Aigo. How can I help?'}],ts:Date.now()});
  saveChats();renderHistory();renderMessages();
  switchTab('chat');$('msgInput').focus();
}
function openChat(id){
  chatId=id;renderHistory();renderMessages();switchTab('chat');
}
function delChat(id){
  chats=chats.filter(c=>c.id!==id);saveChats();renderHistory();
  if(chatId===id&&chats.length){openChat(chats[0].id)}else if(!chats.length){newChat()}
}
function updateChatTitle(text){
  const c=chats.find(x=>x.id===chatId);if(c&&!c.titleSet){c.title=text.slice(0,40);c.titleSet=true;saveChats();renderHistory()}
}
function addMsg(who,text,isUser){
  const c=chats.find(x=>x.id===chatId);if(c){c.messages.push({role:isUser?'user':'bot',text});saveChats();if(isUser)updateChatTitle(text)}
  renderMessages();
}
function renderMessages(){
  const c=chats.find(x=>x.id===chatId),box=$('messages');
  box.innerHTML='';
  if(!c||!c.messages.length){box.innerHTML='<div class="empty">No messages yet</div>';return}
  c.messages.forEach(m=>{
    const d=document.createElement('div');d.className='msg '+(m.role==='user'?'user':'bot');
    d.innerHTML='<div class="who">'+(m.role==='user'?'<b>You</b>':'<b>Aigo</b>')+'</div><div class="bubble">'+esc(m.text)+'<span class="copy" onclick="navigator.clipboard.writeText(this.parentElement.innerText.replace(/copy$/,''))">copy</span></div>';
    box.appendChild(d);
  });
  box.scrollTop=box.scrollHeight;
}

function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('active',p.id==='p-'+tab));
  $('pageTitle').textContent=tab[0].toUpperCase()+tab.slice(1);
  if(tab==='chat')setTimeout(()=>$('msgInput').focus(),50);
  if(tab==='skills'){loadSkills('popular');loadStats()}
  if(tab==='settings')loadSettings();
  if(window.innerWidth<=640){$('sidebar').classList.remove('open');$('overlay').classList.remove('open')}
}

function sendMsg(){
  const inp=$('msgInput'),text=inp.value.trim();if(!text)return;
  inp.value='';$('sendBtn').disabled=true;addMsg('You',text,true);$('typing').classList.add('active');
  let full='';
  fetch('/api/chat/stream',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:text})})
    .then(r=>{if(!r.ok)throw new Error('stream');return r.body.getReader()})
    .then(reader=>{
      const dec=new TextDecoder();let buf='';
      function read(){reader.read().then(({done,value})=>{
        if(done){addMsg('Aigo',full,false);$('typing').classList.remove('active');$('sendBtn').disabled=false;inp.focus();return}
        buf+=dec.decode(value,{stream:true});
        const lines=buf.split('\n');buf=lines.pop()||'';
        for(const line of lines){if(!line.startsWith('data: '))continue;try{const data=JSON.parse(line.slice(6));if(data.chunk){full+=data.chunk}if(data.error){full='Error: '+data.error}}catch(e){}}
        read();
      })}
      read();
    })
    .catch(()=>{
      fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:text})})
        .then(r=>r.json()).then(j=>{addMsg('Aigo',j.ok?j.response:'Error: '+(j.error||'unknown'),false)})
        .catch(e=>{addMsg('Aigo','Error: '+e.message,false)})
        .finally(()=>{$('typing').classList.remove('active');$('sendBtn').disabled=false;inp.focus()});
    });
}

// Stats
function loadStats(){
  fetch('/api/stats').then(r=>r.json()).then(d=>{
    $('stUptime').textContent=d.uptime||'-';$('stMsgs').textContent=d.messages||0;
    $('stModel').textContent=(d.provider||'')+' / '+(d.model||'');$('stTools').textContent=d.tools||0;
  }).catch(()=>{});
}
setInterval(loadStats,8000);loadStats();

// Skills
function loadSkills(tab){
  skillPage=tab;const box=$('skillsBox');box.innerHTML='<div class="empty">Loading…</div>';
  let url;if(tab==='popular')url='/api/skills/popular?limit=50';else if(tab==='installed')url='/api/skills/list';else if(tab==='sources')url='/api/skills/sources';else url='/api/skills/browse?limit=100';
  fetch(url).then(r=>r.json()).then(d=>{
    if(!d.ok){box.innerHTML='<div class="empty">Error: '+esc(d.error)+'</div>';return}
    if(tab==='sources'){renderSources(d.sources||[],box);return}
    const list=d.skills||[];if(!list.length){box.innerHTML='<div class="empty">No skills found.</div>';return}
    box.innerHTML='';list.forEach(s=>box.appendChild(renderSkill(s,tab!=='installed')));
  }).catch(e=>{box.innerHTML='<div class="empty">Error: '+esc(e.message)+'</div>'});
}
function renderSkill(s,showInstall){
  const row=document.createElement('div');row.className='skill-row';
  row.innerHTML='<div class="left"><div class="name">'+esc(s.name)+'</div><div class="desc">'+esc((s.description||'').slice(0,120))+'</div></div><div class="right">'+(s.source?'<span class="tag">'+esc(s.source)+'</span>':'')+(showInstall?'<button class="btn" onclick="installSkill(this,\''+esc(s.identifier)+'\')">Install</button>':'<span class="tag" style="color:var(--green)">Installed</span>')+'</div>';
  return row;
}
function renderSources(srcs,box){box.innerHTML='';if(!srcs.length){box.innerHTML='<div class="empty">No sources</div>';return}srcs.forEach(s=>{const d=document.createElement('div');d.className='skill-row';d.innerHTML='<div class="left"><div class="name">'+esc(s.name)+'</div><div class="desc">'+esc(s.url)+'</div></div><div class="right"><span class="tag">'+esc(s.type)+'</span></div>';box.appendChild(d)})}
function searchSkills(){const q=$('skillQ').value.trim();if(!q)return;const box=$('skillsBox');box.innerHTML='<div class="empty">Searching…</div>';fetch('/api/skills/search?q='+encodeURIComponent(q)).then(r=>r.json()).then(d=>{if(!d.ok){box.innerHTML='<div class="empty">'+esc(d.error)+'</div>';return}const list=d.skills||[];if(!list.length){box.innerHTML='<div class="empty">No results</div>';return}box.innerHTML='';list.forEach(s=>box.appendChild(renderSkill(s,true)))}).catch(e=>{box.innerHTML='<div class="empty">'+esc(e.message)+'</div>'})}
function installSkill(btn,id){btn.textContent='…';btn.disabled=true;fetch('/api/skills/install',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({identifier:id})}).then(r=>r.json()).then(d=>{if(d.ok){btn.textContent='Done';btn.classList.add('done');toast('Installed','ok')}else{btn.textContent='Err';toast(d.error,'err')}}).catch(e=>{btn.textContent='Err';toast(e.message,'err')})}
function syncSkills(){const box=$('skillsBox');box.innerHTML='<div class="empty">Syncing…</div>';fetch('/api/skills/sync',{method:'POST'}).then(r=>r.json()).then(d=>{toast(d.ok?'Synced '+d.total+' skills':'Sync failed',d.ok);loadSkills('popular')}).catch(e=>toast(e.message,'err'))}

// Settings
const configFields=[
  {section:'Provider',fields:[
    {key:'provider',label:'Provider',type:'select',opts:['nous','openai','anthropic','ollama','openrouter','openai-compatible'],hint:'AI provider'},
    {key:'api_key',label:'API Key',type:'password',hint:'Local only'},
    {key:'base_url',label:'Base URL',type:'text',hint:'API endpoint'},
    {key:'model',label:'Model',type:'text',hint:'Model name'}
  ]},
  {section:'Channels',fields:[
    {key:'telegram_token',label:'Telegram Token',type:'password',hint:'From @BotFather'},
    {key:'discord_token',label:'Discord Token',type:'password',hint:'From Discord portal'},
    {key:'slack_app_token',label:'Slack App Token',type:'password',hint:'xapp-...'},
    {key:'slack_bot_token',label:'Slack Bot Token',type:'password',hint:'xoxb-...'}
  ]},
  {section:'Memory',fields:[
    {key:'memory_enabled',label:'Memory',type:'select',opts:['true','false'],hint:'Remember conversations'},
    {key:'use_fts5',label:'FTS5 Search',type:'select',opts:['true','false'],hint:'SQLite full-text search'}
  ]},
  {section:'Behavior',fields:[
    {key:'max_tokens',label:'Max Tokens',type:'number',hint:'Response length limit'},
    {key:'temperature',label:'Temperature',type:'number',hint:'0.0 precise — 1.0 creative'},
    {key:'system_prompt',label:'System Prompt',type:'textarea',hint:'Custom instructions'}
  ]}
];
function loadSettings(){
  const box=$('settingsBox');box.innerHTML='<div class="empty">Loading…</div>';
  fetch('/api/config').then(r=>r.json()).then(cfg=>{
    let html='<h2>Settings</h2>';
    configFields.forEach(sec=>{
      html+='<div class="section"><h3>'+esc(sec.section)+'</h3>';
      sec.fields.forEach(f=>{
        const val=cfg[f.key]!=null?String(cfg[f.key]):'';
        html+='<div class="field"><label>'+esc(f.label)+'</label>';
        if(f.type==='select'){html+='<select data-key="'+f.key+'">'+f.opts.map(o=>'<option value="'+esc(o)+'" '+(val===o?'selected':'')+'>'+esc(o)+'</option>').join('')+'</select>'}
        else if(f.type==='textarea'){html+='<textarea data-key="'+f.key+'" placeholder="'+esc(f.hint)+'">'+esc(val)+'</textarea>'}
        else{html+='<input type="'+f.type+'" data-key="'+f.key+'" value="'+esc(val)+'" placeholder="'+esc(f.hint)+'">'}
        html+='</div>';
      });
      html+='</div>';
    });
    html+='<div class="actions"><button class="primary" onclick="saveSettings()">Save</button><button class="secondary" onclick="loadSettings()">Reset</button></div>';
    box.innerHTML=html;
  }).catch(()=>{box.innerHTML='<div class="empty">Failed to load config</div>'});
}
function saveSettings(){
  const cfg={};document.querySelectorAll('[data-key]').forEach(el=>{let v=el.value;if(v==='true')v=true;else if(v==='false')v=false;else if(el.type==='number'&&v!=='')v=Number(v);if(v!=='')cfg[el.dataset.key]=v});
  fetch('/api/config/save',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(cfg)}).then(r=>r.json()).then(d=>toast(d.ok?'Saved':'Error: '+(d.error||''),d.ok)).catch(e=>toast(e.message,'err'));
}

// Init
loadChats();
if(!chats.length)newChat();
else{renderHistory();renderMessages();}
$('msgInput').focus();
</script>
</body>
