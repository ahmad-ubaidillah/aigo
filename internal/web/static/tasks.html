<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aigo — Tasks</title>
  <link rel="stylesheet" href="/static/app.css">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body>
  <nav class="nav">
    <a href="/">Dashboard</a>
    <a href="/chat.html">Chat</a>
    <a href="/agents.html">Agents</a>
    <a href="/tasks.html" class="active">Tasks</a>
    <a href="/channels.html">Channels</a>
    <a href="/memory.html">Memory</a>
    <a href="/settings.html">Settings</a>
  </nav>

  <div class="container" x-data="{
    tasks: [], columns: {backlog:[],in_progress:[],review:[],done:[]},
    async load() {
      this.tasks = await (await fetch('/api/tasks')).json();
      this.columns = {backlog:[],in_progress:[],review:[],done:[]};
      this.tasks.forEach(t => {
        const col = t.status === 'in_progress' ? 'in_progress' : t.status === 'done' ? 'done' : t.status === 'review' ? 'review' : 'backlog';
        this.columns[col].push(t);
      });
    },
    async moveTask(taskId, newStatus) {
      await fetch('/api/tasks/' + taskId + '/execute', {method:'POST'});
      this.load();
    }
  }" x-init="load()">
    <h2 style="margin-bottom:1rem">Task Board</h2>
    <div class="kanban">
      <template x-for="[col, label] in [['backlog','Backlog'],['in_progress','In Progress'],['review','Review'],['done','Done']]" :key="col">
        <div class="kanban-col">
          <div class="kanban-col-title" x-text="label"></div>
          <template x-for="task in columns[col]" :key="task.id">
            <div class="kanban-card" @click="col!=='done'&&moveTask(task.id, col==='backlog'?'in_progress':col==='in_progress'?'review':'done')">
              <div x-text="task.description"></div>
              <div style="margin-top:0.5rem;display:flex;justify-content:space-between">
                <span class="badge" :class="task.priority==='high'?'badge-danger':task.priority==='medium'?'badge-warning':'badge-info'" x-text="task.priority"></span>
                <span class="badge badge-success" x-text="task.status"></span>
              </div>
            </div>
          </template>
        </div>
      </template>
    </div>
  </div>
  <script src="/static/app.js"></script>
</body>
</html>
