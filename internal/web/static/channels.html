<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aigo — Channels</title>
  <link rel="stylesheet" href="/static/app.css">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body>
  <nav class="nav">
    <a href="/">Dashboard</a>
    <a href="/chat.html">Chat</a>
    <a href="/agents.html">Agents</a>
    <a href="/tasks.html">Tasks</a>
    <a href="/channels.html" class="active">Channels</a>
    <a href="/memory.html">Memory</a>
    <a href="/settings.html">Settings</a>
  </nav>

  <div class="container" x-data="{
    platforms: [], token: {},
    async load() { this.platforms = await (await fetch('/api/gateways')).json(); },
    async connect(p) {
      if (!this.token[p.name]) { showToast('Enter a token first','error'); return; }
      await fetch('/api/gateways', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({platform:p.name,action:'connect',token:this.token[p.name]})});
      showToast(p.name + ' connected'); this.load();
    },
    async disconnect(p) {
      await fetch('/api/gateways', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({platform:p.name,action:'disconnect'})});
      showToast(p.name + ' disconnected'); this.load();
    }
  }" x-init="load()">
    <h2 style="margin-bottom:1rem">Messaging Channels</h2>
    <div style="display:grid;gap:1rem">
      <template x-for="p in platforms" :key="p.name">
        <div class="card platform-card">
          <div class="platform-info">
            <div class="platform-icon" style="background:var(--bg-card)"><span x-text="p.name==='telegram'?'📱':p.name==='discord'?'🎮':p.name==='slack'?'💼':'📞'"></span></div>
            <div>
              <h3 x-text="p.name.charAt(0).toUpperCase()+p.name.slice(1)"></h3>
              <span class="badge" :class="p.connected?'badge-success':'badge-danger'" x-text="p.status"></span>
            </div>
          </div>
          <div style="display:flex;gap:0.5rem;align-items:center">
            <input class="input" style="width:250px" x-model="token[p.name]" :placeholder="p.name+' token'" x-show="!p.connected">
            <button class="btn btn-sm btn-success" @click="connect(p)" x-show="!p.connected">Connect</button>
            <button class="btn btn-sm btn-danger" @click="disconnect(p)" x-show="p.connected">Disconnect</button>
          </div>
        </div>
      </template>
    </div>
  </div>
  <script src="/static/app.js"></script>
</body>
</html>
