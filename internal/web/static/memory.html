<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aigo — Memory</title>
  <link rel="stylesheet" href="/static/app.css">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body>
  <nav class="nav">
    <a href="/">Dashboard</a>
    <a href="/chat.html">Chat</a>
    <a href="/agents.html">Agents</a>
    <a href="/tasks.html">Tasks</a>
    <a href="/channels.html">Channels</a>
    <a href="/memory.html" class="active">Memory</a>
    <a href="/settings.html">Settings</a>
  </nav>

  <div class="container" x-data="{
    memories: [], query: '', category: '', newContent: '', newCategory: '', newTags: '',
    async load() {
      const q = this.query ? '?q=' + encodeURIComponent(this.query) + (this.category?'&category='+this.category:'') : (this.category?'?category='+this.category:'');
      this.memories = await (await fetch('/api/memory' + q)).json();
    },
    async add() {
      if (!this.newContent) return;
      await fetch('/api/memory', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({content:this.newContent,category:this.newCategory,tags:this.newTags})});
      this.newContent=''; this.newCategory=''; this.newTags=''; showToast('Memory added'); this.load();
    },
    async del(id) {
      await fetch('/api/memory/' + id, {method:'DELETE'});
      showToast('Memory deleted'); this.load();
    }
  }" x-init="load()">
    <div class="card" style="margin-bottom:1rem">
      <h3 class="card-title">Add Memory</h3>
      <div class="form-group"><label class="form-label">Content</label><textarea class="input" x-model="newContent"></textarea></div>
      <div style="display:flex;gap:0.5rem">
        <input class="input" x-model="newCategory" placeholder="Category">
        <input class="input" x-model="newTags" placeholder="Tags (comma-separated)">
        <button class="btn btn-primary" @click="add()">Add</button>
      </div>
    </div>

    <div class="card">
      <h3 class="card-title">Search</h3>
      <div style="display:flex;gap:0.5rem;margin-bottom:1rem">
        <input class="input" x-model="query" placeholder="Search memories..." @keydown.enter="load()">
        <input class="input" style="width:150px" x-model="category" placeholder="Category" @keydown.enter="load()">
        <button class="btn btn-primary" @click="load()">Search</button>
      </div>
      <div>
        <template x-for="m in memories" :key="m.id">
          <div class="card" style="margin-bottom:0.5rem;display:flex;justify-content:space-between;align-items:start">
            <div>
              <span class="badge badge-info" x-text="m.category"></span>
              <p style="margin-top:0.5rem" x-text="m.content"></p>
            </div>
            <button class="btn btn-sm btn-danger" @click="del(m.id)">Delete</button>
          </div>
        </template>
        <p x-show="memories.length===0" class="text-muted">No memories found.</p>
      </div>
    </div>
  </div>
  <script src="/static/app.js"></script>
</body>
</html>
