<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aigo Dashboard</title>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <link rel="stylesheet" href="/static/app.css">
</head>
<body x-data="dashboard()" x-init="init()">
    <div class="app">
        <aside class="sidebar">
            <div class="brand">
                <span class="logo">⬡</span>
                <span class="name">Aigo</span>
            </div>
            <nav>
                <a href="#" @click.prevent="tab='overview'" :class="{active: tab==='overview'}">Overview</a>
                <a href="#" @click.prevent="tab='sessions'" :class="{active: tab==='sessions'}">Sessions</a>
                <a href="#" @click.prevent="tab='tasks'" :class="{active: tab==='tasks'}">Tasks</a>
                <a href="#" @click.prevent="tab='memory'" :class="{active: tab==='memory'}">Memory</a>
                <a href="#" @click.prevent="tab='skills'" :class="{active: tab==='skills'}">Skills</a>
                <a href="#" @click.prevent="tab='settings'" :class="{active: tab==='settings'}">Settings</a>
            </nav>
            <div class="status">
                <span class="dot" :class="wsConnected ? 'green' : 'red'"></span>
                <span x-text="wsConnected ? 'Connected' : 'Disconnected'"></span>
            </div>
        </aside>

        <main class="content">
            <!-- Overview -->
            <template x-if="tab === 'overview'">
                <div class="page">
                    <h1>Dashboard</h1>
                    <div class="stats">
                        <div class="card stat">
                            <div class="stat-value" x-text="stats.sessions"></div>
                            <div class="stat-label">Sessions</div>
                        </div>
                        <div class="card stat">
                            <div class="stat-value" x-text="stats.tasks"></div>
                            <div class="stat-label">Tasks</div>
                        </div>
                        <div class="card stat">
                            <div class="stat-value" x-text="stats.memories"></div>
                            <div class="stat-label">Memories</div>
                        </div>
                        <div class="card stat">
                            <div class="stat-value" x-text="stats.skills"></div>
                            <div class="stat-label">Skills</div>
                        </div>
                    </div>
                    <div class="card">
                        <h2>Recent Activity</h2>
                        <div class="activity-list">
                            <template x-for="event in events.slice().reverse().slice(0, 20)" :key="event.id">
                                <div class="activity-item">
                                    <span class="activity-time" x-text="formatTime(event.timestamp)"></span>
                                    <span class="activity-type" :class="'type-' + event.type" x-text="event.type"></span>
                                    <span class="activity-msg" x-text="event.message"></span>
                                </div>
                            </template>
                            <template x-if="events.length === 0">
                                <p class="empty">No activity yet. Start a task to see events here.</p>
                            </template>
                        </div>
                    </div>
                </div>
            </template>

            <!-- Sessions -->
            <template x-if="tab === 'sessions'">
                <div class="page">
                    <div class="page-header">
                        <h1>Sessions</h1>
                        <button class="btn primary" @click="newSession()">+ New Session</button>
                    </div>
                    <div class="card">
                        <table class="data-table">
                            <thead>
                                <tr><th>ID</th><th>Status</th><th>Messages</th><th>Created</th><th>Actions</th></tr>
                            </thead>
                            <tbody>
                                <template x-for="s in sessions" :key="s.id">
                                    <tr>
                                        <td x-text="s.id"></td>
                                        <td><span class="badge" :class="'badge-' + s.status" x-text="s.status"></span></td>
                                        <td x-text="s.message_count || 0"></td>
                                        <td x-text="formatDate(s.created_at)"></td>
                                        <td>
                                            <button class="btn sm" @click="viewSession(s.id)">View</button>
                                            <button class="btn sm danger" @click="deleteSession(s.id)">Delete</button>
                                        </td>
                                    </tr>
                                </template>
                                <template x-if="sessions.length === 0">
                                    <tr><td colspan="5" class="empty">No sessions yet.</td></tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </div>
            </template>

            <!-- Tasks -->
            <template x-if="tab === 'tasks'">
                <div class="page">
                    <div class="page-header">
                        <h1>Tasks</h1>
                        <button class="btn primary" @click="showTaskForm = true">+ New Task</button>
                    </div>
                    <div class="card" x-show="showTaskForm" x-cloak>
                        <h2>Create Task</h2>
                        <form @submit.prevent="createTask()">
                            <div class="form-group">
                                <label>Description</label>
                                <input type="text" x-model="newTaskDesc" placeholder="What should I do?" required>
                            </div>
                            <div class="form-group">
                                <label>Category</label>
                                <select x-model="newTaskCategory">
                                    <option value="general">General</option>
                                    <option value="coding">Coding</option>
                                    <option value="research">Research</option>
                                    <option value="debug">Debug</option>
                                </select>
                            </div>
                            <div class="form-actions">
                                <button type="submit" class="btn primary">Create</button>
                                <button type="button" class="btn" @click="showTaskForm = false">Cancel</button>
                            </div>
                        </form>
                    </div>
                    <div class="card">
                        <table class="data-table">
                            <thead>
                                <tr><th>ID</th><th>Description</th><th>Status</th><th>Category</th><th>Created</th></tr>
                            </thead>
                            <tbody>
                                <template x-for="t in tasks" :key="t.id">
                                    <tr>
                                        <td x-text="t.id"></td>
                                        <td x-text="t.description"></td>
                                        <td><span class="badge" :class="'badge-' + t.status" x-text="t.status"></span></td>
                                        <td x-text="t.category"></td>
                                        <td x-text="formatDate(t.created_at)"></td>
                                    </tr>
                                </template>
                                <template x-if="tasks.length === 0">
                                    <tr><td colspan="5" class="empty">No tasks yet.</td></tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </div>
            </template>

            <!-- Memory -->
            <template x-if="tab === 'memory'">
                <div class="page">
                    <h1>Memory</h1>
                    <div class="card">
                        <div class="form-group">
                            <input type="text" x-model="memorySearch" @input.debounce.300ms="searchMemories()" placeholder="Search memories...">
                        </div>
                        <div class="memory-list">
                            <template x-for="m in memories" :key="m.id">
                                <div class="memory-item">
                                    <div class="memory-content" x-text="m.content"></div>
                                    <div class="memory-meta">
                                        <span x-text="m.type"></span>
                                        <span x-text="formatDate(m.created_at)"></span>
                                    </div>
                                </div>
                            </template>
                            <template x-if="memories.length === 0">
                                <p class="empty">No memories stored yet.</p>
                            </template>
                        </div>
                    </div>
                </div>
            </template>

            <!-- Skills -->
            <template x-if="tab === 'skills'">
                <div class="page">
                    <h1>Skills Library</h1>
                    <div class="skills-grid">
                        <template x-for="skill in skills" :key="skill.name">
                            <div class="card skill-card">
                                <h3 x-text="skill.name"></h3>
                                <p x-text="skill.description"></p>
                                <div class="skill-meta">
                                    <span class="badge" x-text="skill.category || 'general'"></span>
                                    <span class="badge" :class="skill.enabled ? 'badge-active' : 'badge-inactive'" x-text="skill.enabled ? 'Enabled' : 'Disabled'"></span>
                                </div>
                            </div>
                        </template>
                        <template x-if="skills.length === 0">
                            <div class="card"><p class="empty">No skills installed. Place skills in ~/.aigo/skills/</p></div>
                        </template>
                    </div>
                </div>
            </template>

            <!-- Settings -->
            <template x-if="tab === 'settings'">
                <div class="page">
                    <h1>Settings</h1>
                    <div class="card">
                        <h2>Model</h2>
                        <div class="form-group">
                            <label>Default Model</label>
                            <input type="text" x-model="settings.model_default" @change="saveSettings()">
                        </div>
                        <div class="form-group">
                            <label>Coding Model</label>
                            <input type="text" x-model="settings.coding_model" @change="saveSettings()">
                        </div>
                    </div>
                    <div class="card">
                        <h2>Memory</h2>
                        <div class="form-group">
                            <label>Max L0 Items</label>
                            <input type="number" x-model.number="settings.max_l0_items" @change="saveSettings()">
                        </div>
                        <div class="form-group">
                            <label>Token Budget</label>
                            <input type="number" x-model.number="settings.token_budget" @change="saveSettings()">
                        </div>
                        <div class="form-group">
                            <label>
                                <input type="checkbox" x-model="settings.auto_compress" @change="saveSettings()">
                                Auto Compress
                            </label>
                        </div>
                    </div>
                    <div class="card">
                        <h2>System</h2>
                        <div class="form-group">
                            <label>OpenCode Binary</label>
                            <input type="text" x-model="settings.opencode_binary" @change="saveSettings()">
                        </div>
                        <div class="form-group">
                            <label>OpenCode Timeout (s)</label>
                            <input type="number" x-model.number="settings.opencode_timeout" @change="saveSettings()">
                        </div>
                    </div>
                </div>
            </template>
        </main>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
